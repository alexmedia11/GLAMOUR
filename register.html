<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glamour - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #000; color: #fff; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; padding: 40px 10px; }
        .logo-placeholder { margin-bottom: 25px; display: flex; justify-content: center; }
        h1 { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { font-size: 16px; color: #888; margin-bottom: 40px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .input-container { width: 100%; display: flex; align-items: center; background-color: #111; border: 1.5px solid #222; border-radius: 12px; padding: 16px; }
        .icon { font-size: 18px; margin-right: 15px; opacity: 0.7; }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; }
        
        /* Error state styling */
        .input-container.error { border-color: #ff4444; }

        .continue-btn {
            width: 100%; background-color: #eab308; color: #000; border: none; padding: 18px;
            border-radius: 30px; font-size: 14px; font-weight: 600; text-transform: uppercase;
            cursor: pointer; margin-top: 30px; display: flex; align-items: center; justify-content: center;
        }
        .footer-note { margin-top: 30px; text-align: center; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-placeholder">
        <span style="font-size: 40px;">❄️</span>
    </div>

    <h1>Sign Up</h1>
    <p class="subtitle">Create your professional Glamour account.</p>

    <form id="registrationForm">
        <div class="form-group">
            <label>Full Name</label>
            <div class="input-container">
                <span class="icon">👤</span>
                <input type="text" placeholder="John Doe" id="fullname" required>
            </div>
        </div>

        <div class="form-group">
            <label>Username</label>
            <div class="input-container">
                <span class="icon">🏷️</span>
                <input type="text" placeholder="@glamour_pro" id="username" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <div class="input-container">
                <span class="icon">✉️</span>
                <input type="email" placeholder="name@example.com" id="email" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-container">
                <span class="icon">🔒</span>
                <input type="password" placeholder="••••••••" id="password" required>
            </div>
        </div>

        <button type="button" class="continue-btn" onclick="validateAndContinue()">
            Continue to Packages →
        </button>
    </form>

    <div class="footer-note">By creating your account, you agree to our <span>Terms & Privacy Policy</span></div>
</div>

<script>
function validateAndContinue() {
    // Get all input values
    const name = document.getElementById('fullname').value.trim();
    const user = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value.trim();

    // Check if any field is empty
    if (name === "" || user === "" || email === "" || pass === "") {
        alert("Please fill in all your details to create your account.");
        return; // Stops the function here
    }

    // Check if email looks valid (has @)
    if (!email.includes("@")) {
        alert("Please enter a valid email address.");
        return;
    }

    // If everything is fine, move to the next page
    window.location.href = 'plans.html';
}
</script>

</body>
</html>
