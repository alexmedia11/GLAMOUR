<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glamour | Payment Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f8fafc; color: #0f172a; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; }

        /* Header */
        .back-nav { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; font-weight: 600; font-size: 16px; cursor: pointer; }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        p.subtitle { font-size: 14px; color: #64748b; margin-bottom: 30px; }

        /* Payment Card */
        .pay-card { 
            background: #fff; border-radius: 28px; padding: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9;
        }
        .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .value { font-size: 20px; font-weight: 700; margin: 5px 0 20px 0; color: #0f172a; }
        
        .copy-btn { 
            width: 100%; background: #f1f5f9; border: none; padding: 14px; 
            border-radius: 16px; font-weight: 600; color: #1e3a8a; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        /* Telegram Proof Section */
        .proof-section { margin-top: 40px; text-align: center; }
        .proof-section h3 { font-size: 16px; margin-bottom: 15px; }
        .telegram-btn {
            background: #0088cc; color: #fff; width: 100%; padding: 18px;
            border-radius: 20px; text-decoration: none; display: block;
            font-weight: 700; font-size: 15px; box-shadow: 0 8px 16px rgba(0,136,204,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="back-nav" onclick="history.back()">← Back to Dashboard</div>
    
    <h1>Payment Details</h1>
    <p class="subtitle">Transfer the exact amount to the account below to activate your account.</p>

    <div class="pay-card">
        <div class="label">Bank Name</div>
        <div class="value" id="bankName">Moniepoint Microfinance Bank</div>
        
        <div class="label">Account Name</div>
        <div class="value" id="accName">Glamour Official</div>
        
        <div class="label">Account Number</div>
        <div class="value" id="accNum" style="color: #1e3a8a; font-size: 24px;">8219304721</div>

        <button class="copy-btn" onclick="copyDetails()">
            <span id="copyIcon">📋</span> <span id="copyText">Copy Account Number</span>
        </button>
    </div>

    <div class="proof-section">
        <h3>Payment Verification</h3>
        <a href="https://t.me/YourTelegramLink" class="telegram-btn">
            Send Proof via Telegram ✈️
        </a>
    </div>
</div>

<script>
    function copyDetails() {
        const text = document.getElementById('accNum').innerText;
        navigator.clipboard.writeText(text);
        
        const btnText = document.getElementById('copyText');
        const icon = document.getElementById('copyIcon');
        
        btnText.innerText = "Copied!";
        icon.innerText = "✅";
        
        setTimeout(() => {
            btnText.innerText = "Copy Account Number";
            icon.innerText = "📋";
        }, 2000);
    }
</script>

</body>
</html>
