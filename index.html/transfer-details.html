<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Details | Glamour</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 400px; width: 100%; text-align: center; }
        
        .info-box { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); padding: 15px; border-radius: 15px; margin: 20px 0; font-size: 14px; }
        
        .card { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; }
        
        .timer-box { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .timer { font-size: 35px; font-weight: bold; color: var(--gold); }
        
        .bank-box { background: #1a1a1a; padding: 20px; border-radius: 15px; border-top: 4px solid var(--gold); }
        .acc-num { font-size: 26px; font-weight: bold; margin: 10px 0; display: flex; justify-content: center; gap: 10px; align-items: center; }
        
        .copy-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--gold); }
        
        .complete-btn { background: var(--gold); color: black; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; border: none; margin-top: 25px; cursor: pointer; }

        .submit-hint {
    font-size: 13px;
    color: #888;
    margin: 25px 0 15px;
}

.payment-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.contact-link {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 16px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
    transition: transform 0.2s, background 0.3s;
}

/* WhatsApp Brand Color (with a Glamour twist) */
.whatsapp {
    background-color: #25D366;
    color: white;
}

/* Telegram Brand Color */
.telegram {
    background-color: #0088cc;
    color: white;
}

.contact-link:hover {
    transform: translateY(-3px);
    filter: brightness(1.1);
}

.contact-link .icon {
    font-size: 20px;
}
    </style>
</head>
<body>

<div class="container">
    <div style="font-size: 30px; color: var(--gold);">🔒</div>
    
    <div class="info-box">
        To activate your <b>Glamour</b> account, kindly transfer exactly <b>₦14,000</b> to the account below.
    </div>

    <div class="card">
        <div class="timer-box">
            <p style="margin:0; font-size: 12px; color: #888;">Complete payment within:</p>
            <div id="countdown" class="timer">10:00</div>
        </div>

        <div class="bank-box">
            <p style="color: var(--gold); font-size: 11px; letter-spacing: 1px; margin:0;">GLAMOUR PAYMENT GATEWAY</p>
            <h3 style="margin: 10px 0 5px;">U-B-A</h3>
            <div class="acc-num">
                <span id="num">2394786405</span>
                <button class="copy-btn" onclick="copyText()">📋</button>
            </div>
            <p style="margin:0; color: #888;"> CHIDIMMA ANN IGWE</p>
        </div>
        
        <p style="font-size: 11px; color: #555; margin-top: 15px;">After transfer, tap the button below to submit proof.</p>
    </div>

    <div class="payment-actions">
    <p class="submit-hint">Submit your proof of payment via:</p>
    
    <a href="https://wa.me/2348084129747?text=Hello%20Glamour,%20I%20have%20completed%20my%20payment." 
       class="contact-link whatsapp" target="_blank">
        <span class="icon">💬</span> WhatsApp
    </a>

    <a href="https://t.me/Glamour_Coac" 
       class="contact-link telegram" target="_blank">
        <span class="icon">✈️</span> Telegram
    </a>
</div>

<script>
    // Timer Logic
    let time = 600;
    const timerEl = document.getElementById('countdown');
    setInterval(() => {
        let mins = Math.floor(time / 60);
        let secs = time % 60;
        timerEl.innerHTML = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if(time > 0) time--;
    }, 1000);

    // Copy Logic
    function copyText() {
        const text = document.getElementById('num').innerText;
        navigator.clipboard.writeText(text);
        alert("Account copied!");
    }
</script>

</body>
</html>
